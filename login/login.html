<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login - TAIKO & U</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/theme/global.css" />
    <link rel="stylesheet" href="login.css" />
  </head>

  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <h1>TAIKO & U</h1>
          <p>Teman Analisis Kesehatan Organisasi & UMKM</p>
        </div>

        <h2>Masuk ke Akun</h2>

        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email</label>
            <input
              id="loginEmail"
              type="email"
              placeholder="Masukkan email"
              required
            />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input
              id="loginPassword"
              type="password"
              placeholder="Masukkan password"
              required
            />
          </div>

          <button id="loginButton" type="submit" class="btn-login">
            Masuk
          </button>
        </form>

        <p class="login-note">
          Belum punya akun?
          <a href="../register/register.html">Daftar di sini</a>
        </p>

        <a href="../landing_page/landing.html" class="back-link">
          ← Kembali ke Landing Page
        </a>
      </div>
    </div>

    <script src="/js/api.js"></script>

    <script>
      async function handleLogin(e) {
        e.preventDefault();

        const button = document.getElementById("loginButton");
        button.disabled = true;
        button.textContent = "Masuk...";

        const email = document
          .getElementById("loginEmail")
          .value.trim()
          .toLowerCase();
        const password = document.getElementById("loginPassword").value.trim();

        if (!email || !password) {
          alert("Email dan password wajib diisi.");
          button.disabled = false;
          button.textContent = "Masuk";
          return;
        }

        try {
          const loginResult = await apiRequest("/api/login", "POST", {
            email,
            password,
          });

          if (!loginResult.success) {
            alert(loginResult.message || "Email atau password salah.");
            button.disabled = false;
            button.textContent = "Masuk";
            return;
          }

          const user = loginResult.user;

          const activeUser = {
            id: user.id,
            user_id: user.id,
            name: user.name,
            email: user.email,
            role: user.role,
            umkm_id: user.umkm_id || null,
            umkm: {
              umkm_id: user.umkm_id || null,
              nama_umkm: user.umkm?.nama_umkm || "UMKM belum tersedia",
              sektor: user.umkm?.sektor || "Sektor belum tersedia",
            },
          };

          localStorage.removeItem("selectedUmkm");
          localStorage.removeItem("previewAssessments");
          localStorage.setItem("isLoggedIn", "true");
          localStorage.setItem("activeUser", JSON.stringify(activeUser));

          if (activeUser.umkm_id) {
            localStorage.setItem("selectedUmkm", JSON.stringify(activeUser.umkm));
          }

          alert("Login berhasil!");
          window.location.href = "../beranda/index.html";
        } catch (error) {
          console.error(error);
          alert("Terjadi kesalahan saat menghubungkan ke server.");
          button.disabled = false;
          button.textContent = "Masuk";
        }
      }
    </script>
  </body>
</html>
